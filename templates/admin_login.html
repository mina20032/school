{% extends "base.html" %}
{% block title %}تسجيل الدخول - لوحة الإدارة{% endblock %}
{% block nav_links %}
<a href="{{ url_for('index') }}">الرئيسية</a>
{% endblock %}
{% block content %}
<div class="card form-card">
    <h2>تسجيل الدخول — لوحة الإدارة</h2>
    <p class="text-muted mb-2">اسم المستخدم وكلمة المرور فقط.</p>
    <form method="post" action="{{ url_for('admin_login') }}">
        <div class="form-group">
            <label for="username">اسم المستخدم</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary">دخول</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">الرئيسية</a>
    </form>
</div>
{% endblock %}
